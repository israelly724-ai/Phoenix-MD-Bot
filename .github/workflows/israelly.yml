on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
build: 20.x
jobs:
  

    

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: israelly
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: application
      run: npm install

    - name: israelly
      run: npm start
